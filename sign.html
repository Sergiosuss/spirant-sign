<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Подпись</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
h2 { margin-bottom: 6px; font-size: 18px; color: #333; }
p.hint { font-size: 13px; color: #888; margin-bottom: 14px; }
#canvas { background: white; border: 2px solid #ccc; border-radius: 8px; display: block; touch-action: none; cursor: crosshair; width: 100%; }
.buttons { display: flex; gap: 12px; margin-top: 14px; width: 100%; }
button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
#clear-btn { background: #eee; color: #333; }
#submit-btn { background: #2481cc; color: white; font-weight: bold; }
#submit-btn:disabled { background: #aaa; }
</style>
</head>
<body>
<h2>Подпишите договор</h2>
<p class="hint">Распишитесь пальцем или мышью</p>
<canvas id="canvas"></canvas>
<div class="buttons">
  <button id="clear-btn">Очистить</button>
  <button id="submit-btn">Подтвердить ✓</button>
</div>
<script>
  const tg = window.Telegram?.WebApp || null;
  if (tg) { tg.ready(); tg.expand(); }

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let drawing = false, hasDrawn = false;
  let strokes = [], current = [];

  function setup() {
    const w = window.innerWidth - 40;
    canvas.width = w; canvas.height = 200;
    canvas.style.width = w + 'px'; canvas.style.height = '200px';
    ctx.strokeStyle = '#0000cc'; ctx.lineWidth = 2.5;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: Math.round(src.clientX - rect.left), y: Math.round(src.clientY - rect.top) };
  }

  function startStroke(p) {
    drawing = true;
    current = [p.x, p.y];
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
  }

  function moveStroke(p) {
    if (!drawing) return;
    current.push(p.x, p.y);
    ctx.lineTo(p.x, p.y); ctx.stroke();
    hasDrawn = true;
  }

  function endStroke() {
    if (drawing && current.length >= 4) strokes.push(current);
    current = []; drawing = false;
  }

  canvas.addEventListener('mousedown', e => startStroke(getPos(e)));
  canvas.addEventListener('mousemove', e => moveStroke(getPos(e)));
  canvas.addEventListener('mouseup', endStroke);
  canvas.addEventListener('mouseleave', endStroke);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); startStroke(getPos(e)); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); moveStroke(getPos(e)); }, { passive: false });
  canvas.addEventListener('touchend', endStroke);

  document.getElementById('clear-btn').addEventListener('click', () => {
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    strokes = []; current = []; hasDrawn = false;
  });

  document.getElementById('submit-btn').addEventListener('click', () => {
    if (!hasDrawn) { alert('Пожалуйста, поставьте подпись'); return; }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Отправляем...';
    const payload = JSON.stringify({ s: strokes, w: canvas.width, h: canvas.height });
    if (tg) {
      tg.sendData(payload);
      btn.textContent = '✅ Готово!';
    } else {
      btn.disabled = false; btn.textContent = 'Подтвердить ✓';
      alert('Ошибка: Telegram WebApp недоступен');
    }
  });

  setup();
</script>
</body>
</html>
